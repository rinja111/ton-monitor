name: TON Buyers Probe

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run buyers probe
        env:
          TG_TOKEN:      ${{ secrets.TG_TOKEN }}
          TG_CHAT:       ${{ secrets.TG_CHAT }}
          BUYER_TOKENS:  ${{ vars.BUYER_TOKENS }}
        run: python find_buyers.py
