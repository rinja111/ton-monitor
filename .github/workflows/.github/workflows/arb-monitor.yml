name: TON Arb Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run arb scanner
        run: python arb_scan.py
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          NETWORK: ton
          ARB_TOKENS: ${{ secrets.ARB_TOKENS }}
          ARB_THRESHOLD: "1"
          ARB_COST: "1.2"
          ARB_MIN_LIQ: "10000"
          ARB_MAX_SPREAD: "5"
